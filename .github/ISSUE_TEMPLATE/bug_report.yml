name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: "e.g. macOS 15.3 Sequoia"
      placeholder: "macOS 15.x"
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - Apple Silicon (M1/M2/M3/M4/M5)
        - Intel
    validations:
      required: true

  - type: input
    id: wireguard-version
    attributes:
      label: wireguard-tools version
      description: "Run: brew info wireguard-tools | head -1"
      placeholder: "wireguard-tools: stable 1.0.x"

  - type: dropdown
    id: script
    attributes:
      label: Which script is affected?
      options:
        - install.sh
        - client.sh
        - status.sh
        - monitor.sh
        - remove.sh
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear description of what went wrong
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant terminal output or log files
      render: shell
